{% set name = "sasview" %}
{% set version = "6.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/SasView/{{ name }}/archive/refs/tags/v{{ version }}.tar.gz
  sha256: aef0ba60b5eda5c9b3d486250dc60407c549ae4a3cacacac6a80fa2cb0c37706

build:
  number: 0
  skip: true  # [py<36 or py>=312 or (osx and arm64)]
  entry_points:
    - sasview = sas.qtgui.MainWindow.MainWindow:run_sasview

requirements:
  build:
    - python                                 # [build_platform != target_platform]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
    - numpy                                  # [build_platform != target_platform]
    - pyside6
    - {{ compiler('cxx') }}
    - {{ stdlib("c") }}
  host:
    - python
    - pip
    - numpy <2
    - pyside6 ==6.4
    - scipy <1.14
    - requests
    - hatchling
    - hatch-requirements-txt
    - hatch-vcs
  run:
    - python
    - bumps
    - dataclasses
    - appdirs
    - cffi
    - docutils
    - dominate
    - h5py
    - html2text
    - html5lib
    - importlib-resources
    - ipython
    - jsonschema
    - lxml
    - mako
    - matplotlib
    - numba
    - periodictable
    - pybind11
    - pylint
    - pyopengl
    - pyparsing
    - pytest
    - pytest-mock
    - pytools
    - qtconsole
    - six
    - sphinx
    - superqt
    - twisted
    - uncertainties
    - unittest-xml-reporting
    - xhtml2pdf >=0.2.16
    - {{ pin_compatible('numpy',max_pin='x.x') }}
    - {{ pin_compatible('scipy',max_pin='x.x') }}
    - {{ pin_compatible('PySide6',max_pin='x.x') }}
test:
  requires:
    - pip
  imports:
    - sas.sasview
    - sas.qtgui
    - sas.qtgui.MainWindow
  commands:
    - pip check
    - which sasview  # [not win]

about:
  home: https://github.com/SasView/sasview
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE.TXT
  summary: SasView is a Small Angle Scattering (SAS) analysis package

extra:
  recipe-maintainers:
    - backmari
    - mdoucet
    - mrakitin
    - rozyczko
    - stuartcampbell
    - pbeaucage
    - wpotrzebowski
